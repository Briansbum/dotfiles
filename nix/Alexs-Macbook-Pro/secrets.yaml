# This file must be encrypted with sops before committing.
# To encrypt: sops -e -i nix/Alexs-Macbook-Pro/secrets.yaml
#
# Generate an age keypair first if you haven't:
#   age-keygen -o ~/Library/Application\ Support/sops/age/keys.txt
#
# Then add the public key to .sops.yaml and encrypt this file.
#
# Note: PostgreSQL DSN is not a secret — it uses local trust auth
# with a dedicated 'goclaw' role (no password). See goclaw.nix.

goclaw_gateway_token: REPLACE_ME
goclaw_encryption_key: REPLACE_ME
goclaw_slack_bot_token: REPLACE_ME
goclaw_slack_app_token: REPLACE_ME
goclaw_anthropic_api_key: REPLACE_ME
